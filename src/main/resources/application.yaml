spring:
  application:
    name: aiAgent
  ai:
    deepseek:
      api-key: 
      chat:
        model: deepseek-v4-flash
        temperature: 0.7
        top-p: 1.0
        max-tokens: 4096
        # ★ 缓存优化：presence_penalty 和 frequency_penalty 保持默认值 0，
        # 不启用惩罚项可让输出更稳定，有利于缓存一致性
        presence-penalty: 0.0
        frequency-penalty: 0.0

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:192.168.154.128}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# Python 图片识别服务器配置
python:
  server:
    url: ${PYTHON_SERVER_URL:http://localhost:5001}
